<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Pokédex</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="pokedex">

<div class="top">

<div class="screen">

<div id="scan"></div>

<h1 id="name">
POKÉDEX
</h1>

<img
id="sprite"
class="reveal"
>

<p
id="types"
class="reveal"
></p>

<select
id="formsSelect"
class="reveal"
onchange="changeForm()"
></select>

<div
id="evolution"
class="reveal"
></div>

</div>

<div
class="stats reveal"
>

<canvas id="statsChart"></canvas>

</div>

</div>

<div
class="type reveal"
>

<canvas id="typeChart"></canvas>

</div>

<div class="controls">

<input
id="input"
placeholder="Search Pokémon Name or #"
>

<button onclick="search()">
SEARCH
</button>

<button
onclick="toggleScan()"
id="scanBtn"
>
SCAN ON
</button>

<button
onclick="toggleShiny()"
id="shinyBtn"
>
SHINY OFF
</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
