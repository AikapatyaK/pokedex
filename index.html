<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>POKEDEX</title>

<link rel="icon"
type="image/png"
href="pokedex-logo.png">

<link rel="manifest"
href="manifest.json">

<link rel="apple-touch-icon"
href="icon-192.png">

<meta name="theme-color"
content="#cc0000">

<link rel="stylesheet"
href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="pokedex">

<div class="screen">

<div id="scan"></div>

<h1 id="name">
POKEDEX
</h1>

<!-- HOME IMAGE -->
<img
id="sprite"
src="pokedex-logo.png"
alt="Pokedex"
>

<p id="types"></p>

<select
id="formsSelect"
class="reveal"
onchange="changeForm()">
</select>

<div
id="evolution"
class="reveal">
</div>

</div>

<div class="controls">

<input
id="input"
placeholder="Pokédex number or name">

<button onclick="search()">
SEARCH
</button>

<button
id="scanBtn"
onclick="toggleScan()">
SCAN ON
</button>

<button
id="shinyBtn"
onclick="toggleShiny()">
SHINY OFF
</button>

</div>

<div class="stats reveal">

<h2>
STATS
</h2>

<canvas id="statsChart"></canvas>

</div>

<div class="type reveal">

<h2>
TYPE EFFECTIVENESS
</h2>

<canvas id="typeChart"></canvas>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
